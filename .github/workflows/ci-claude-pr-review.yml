name: Claude PR Review

concurrency:
  group: ${{ github.event.pull_request.number }}-claude-pr-review
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.issue.pull_request.url && '' }}
          fetch-depth: 1

      - name: Verify commit
        run: git log -1 --oneline

      - name: get model to use
        id: get_model
        uses: actions/github-script@v7
        with:
          script: |
            let useSonnet = true;

            if (context.eventName === 'issue_comment') {
              // Use the triggering comment directly — no API call needed
              const body = context.payload.comment?.body || '';
              useSonnet = body.toLowerCase().includes('@claude sonnet');
            }

            const model = useSonnet ? 'claude-sonnet-4-5-20250929' : 'claude-haiku-4-5-20251001';
            const modelLabel = useSonnet ? 'Sonnet 4.5' : 'Haiku 4.5';
            core.setOutput('model', model);
            core.setOutput('model_label', modelLabel);

      - name: Delete previous Claude reviews
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request?.number ?? context.payload.issue?.number;
            if (!pr_number) return;

            // Delete issue comments posted by the bot
            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
            });
            for (const comment of issueComments) {
              if (
                comment.user?.type === 'Bot' &&
                comment.user?.login === 'github-actions[bot]' &&
                comment.body?.includes('Claude finished')
              ) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

      - name: Run Claude PR Review
        id: claude_review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CF_WEB_ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          track_progress: true
          claude_args: |
            --model ${{ steps.get_model.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr edit:*),Bash(gh api:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            MODEL: ${{ steps.get_model.outputs.model_label }}
            HEAD_SHA: ${{ github.event.pull_request.head.sha }}
            Review PR. Read and follow the CLAUDE.md file at the repository root for project conventions and coding standards.

            Focus your review on:

            1. **Correctness**: Logic errors, bugs, or edge cases
            2. **Security**: Potential vulnerabilities (XSS, injection, etc.)
            3. **Performance**: Unnecessary re-renders, missing memoization, inefficient queries
            4. **Code quality**: Readability, naming, DRY violations, unnecessary complexity, dead code, commented-out code

            Keep the review concise. Only comment on issues that matter — skip style nitpicks. Use inline comments for line-specific issues
            If the changes look good, say so briefly. At the end of the review, show the model used and the estimated cost in tokens and USD.
